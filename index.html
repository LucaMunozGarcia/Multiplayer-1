<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D PARKOUR</title>
<style>
*{margin:0;padding:0;overflow:hidden;}
body{background:#000;font-family:Arial,sans-serif;}
canvas{display:block;}

#hud{
    position:fixed;top:15px;left:15px;
    color:#0ff;font-size:14px;z-index:10;
    text-shadow:0 0 8px #0ff;
    pointer-events:none;
}
#speed{
    position:fixed;bottom:20px;right:20px;
    color:#0f0;font-size:28px;z-index:10;
    text-shadow:0 0 15px #0f0;
    pointer-events:none;
}
#controls{
    position:fixed;bottom:15px;left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.4);font-size:12px;z-index:10;
    text-align:center;pointer-events:none;
}
#players{
    position:fixed;top:15px;right:15px;
    color:#ff0;font-size:15px;z-index:10;
    text-shadow:0 0 8px #ff0;
    pointer-events:none;
}
#crosshair{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:16px;height:16px;z-index:10;
    pointer-events:none;
}
#crosshair::before,#crosshair::after{
    content:'';position:absolute;background:rgba(255,255,255,0.6);
}
#crosshair::before{width:2px;height:16px;left:7px;}
#crosshair::after{width:16px;height:2px;top:7px;}

#chatBox{
    position:fixed;bottom:50px;left:15px;
    width:280px;z-index:20;
}
#chatMsgs{
    height:120px;overflow-y:auto;
    background:rgba(0,0,0,0.5);
    border-radius:6px;padding:8px;
    color:#fff;font-size:12px;margin-bottom:4px;
}
#chatIn{
    width:100%;padding:6px;
    background:rgba(0,0,0,0.7);border:1px solid #444;
    color:#fff;border-radius:4px;display:none;
}

#adminMenu{
    display:none;position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);
    border:2px solid #f00;border-radius:12px;
    padding:25px;z-index:9999;min-width:350px;
    box-shadow:0 0 40px rgba(255,0,0,0.5);
}
#adminMenu h2{
    color:#f00;text-align:center;font-size:22px;
    margin-bottom:15px;
    text-shadow:0 0 20px #f00;
    animation:glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow{
    from{text-shadow:0 0 10px #f00;}
    to{text-shadow:0 0 30px #f00,0 0 50px #f00;}
}
.abtn{
    display:block;width:100%;padding:10px;
    margin:6px 0;border:1px solid #f00;
    background:rgba(255,0,0,0.1);color:#f00;
    font-size:14px;cursor:pointer;
    border-radius:6px;transition:all 0.3s;
}
.abtn:hover{
    background:rgba(255,0,0,0.4);
    box-shadow:0 0 15px rgba(255,0,0,0.5);
}
.aslider{width:100%;margin:4px 0;accent-color:#f00;}
.alabel{color:#f88;font-size:12px;}
#adminClose{
    position:absolute;top:8px;right:12px;
    color:#f00;font-size:18px;cursor:pointer;
    background:none;border:none;
}

#dash{
    position:fixed;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:5;
    background:radial-gradient(circle,transparent 60%,rgba(0,200,255,0.3));
    opacity:0;transition:opacity 0.2s;
}

#deathScreen{
    display:none;position:fixed;top:0;left:0;
    width:100%;height:100%;
    background:rgba(255,0,0,0.3);
    z-index:50;pointer-events:none;
    animation:deathFlash 0.5s;
}
@keyframes deathFlash{
    0%{opacity:1;}100%{opacity:0;}
}
</style>
</head>
<body>

<div id="crosshair"></div>
<div id="hud"><div id="pos">X:0 Y:0 Z:0</div></div>
<div id="speed">0 km/h</div>
<div id="players">Players: 1</div>
<div id="controls">
    WASD = Bewegen | SPACE = Springen | SHIFT = Sprint | E = Dash<br>
    Pfeiltasten = Umschauen | Maus = Umschauen | T = Chat | Double Jump!
</div>
<div id="dash"></div>
<div id="deathScreen"></div>

<div id="chatBox">
    <div id="chatMsgs"></div>
    <input id="chatIn" placeholder="Nachricht...">
</div>

<div id="adminMenu">
    <button id="adminClose" onclick="toggleAdmin()">✕</button>
    <h2>☠ ADMIN PANEL ☠</h2>
    <button class="abtn" onclick="adminCmd('kill_all')">💀 Kill All</button>
    <button class="abtn" onclick="adminCmd('speed_boost')">⚡ Speed Boost All</button>
    <button class="abtn" onclick="adminCmd('tp_all')">🌀 Teleport All Up</button>
    <button class="abtn" onclick="adminCmd('freeze')">🧊 Freeze All</button>
    <button class="abtn" onclick="adminCmd('nuke')">💣 NUKE</button>
    <label class="alabel">Gravitation:</label>
    <input type="range" class="aslider" min="0" max="200" value="100"
           oninput="adminCmd('gravity',{value:this.value/100})">
    <label class="alabel">Eigene Speed:</label>
    <input type="range" class="aslider" min="1" max="50" value="10"
           oninput="mySpeed=this.value*0.04">
    <button class="abtn" onclick="flyMode=!flyMode">🚀 Fly Mode</button>
    <button class="abtn" onclick="godMode=!godMode">🛡 God Mode</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0015);
scene.fog = new THREE.FogExp2(0x0a0015, 0.006);

const camera = new THREE.PerspectiveCamera(85, innerWidth/innerHeight, 0.1, 800);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// LICHT
scene.add(new THREE.AmbientLight(0x334455, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(40, 80, 40);
sun.castShadow = true;
scene.add(sun);

const neonColors = [0xff0044, 0x00ffcc, 0x4400ff, 0xff8800, 0x00ff44];
for(let i=0;i<15;i++){
    const l = new THREE.PointLight(neonColors[i%5], 1.5, 25);
    l.position.set(Math.random()*150-30, Math.random()*20+5, Math.random()*150-30);
    scene.add(l);
}

// MATERIAL
function nMat(c){
    return new THREE.MeshStandardMaterial({color:c, emissive:c, emissiveIntensity:0.2, metalness:0.7, roughness:0.3});
}

// BODEN
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 300),
    new THREE.MeshStandardMaterial({color:0x111133, metalness:0.8, roughness:0.2})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);
scene.add(new THREE.GridHelper(300, 60, 0x002244, 0x001122));

// PLATTFORMEN
const platforms = [];

function addP(x,y,z,w,h,d,c){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), nMat(c||0x00ffcc));
    m.position.set(x,y,z);
    m.castShadow=true;
    m.receiveShadow=true;
    scene.add(m);
    platforms.push({mesh:m, box:new THREE.Box3().setFromObject(m)});
    return m;
}

// === PARKOUR LEVEL ===

// Start Bereich
addP(0, 1, 0, 12, 2, 12, 0x00ffcc);

// Stufe 1 - Einfache Sprünge
addP(14, 2, 0, 5, 1, 5, 0xff0044);
addP(22, 3, 3, 5, 1, 5, 0x4400ff);
addP(30, 4, 0, 5, 1, 5, 0xff8800);
addP(38, 5, -3, 5, 1, 5, 0x00ff44);

// Stufe 2 - Höher
addP(46, 7, 0, 4, 1, 4, 0xff0044);
addP(53, 9, 2, 4, 1, 4, 0x00ffcc);
addP(60, 11, -2, 4, 1, 4, 0x4400ff);
addP(67, 13, 0, 4, 1, 4, 0xff8800);

// Stufe 3 - Treppe
for(let i=0;i<8;i++){
    addP(75+i*3, 15+i*1.5, 0, 3, 0.8, 4, neonColors[i%5]);
}

// Stufe 4 - Schmale Brücke
addP(105, 28, 0, 30, 0.8, 1.5, 0x00ffcc);

// Stufe 5 - Zickzack
addP(125, 28, 6, 4, 1, 4, 0xff0044);
addP(132, 29, -6, 4, 1, 4, 0x4400ff);
addP(139, 30, 6, 4, 1, 4, 0xff8800);
addP(146, 31, -6, 4, 1, 4, 0x00ff44);
addP(153, 32, 0, 4, 1, 4, 0xff0044);

// Stufe 6 - Große Endplattform
addP(165, 32, 0, 15, 2, 15, 0xffff00);

// Deko - Säulen
for(let i=0;i<20;i++){
    const h = 8+Math.random()*25;
    const c = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4,0.4,h,6),
        nMat(neonColors[i%5])
    );
    c.position.set(Math.random()*200-30, h/2, Math.random()*200-80);
    scene.add(c);
}

// Deko - Ringe
for(let i=0;i<8;i++){
    const r = new THREE.Mesh(
        new THREE.TorusGeometry(2.5,0.2,6,16),
        nMat(neonColors[i%5])
    );
    r.position.set(Math.random()*120, 15+Math.random()*20, Math.random()*60-30);
    r.rotation.x = Math.random()*Math.PI;
    scene.add(r);
}

// Sterne
const starV=[];
for(let i=0;i<3000;i++){
    starV.push((Math.random()-0.5)*800, Math.random()*400+30, (Math.random()-0.5)*800);
}
const starG = new THREE.BufferGeometry();
starG.setAttribute('position', new THREE.Float32BufferAttribute(starV,3));
scene.add(new THREE.Points(starG, new THREE.PointsMaterial({color:0xffffff,size:0.4})));

// === SPIELER ===
let px=0, py=3, pz=0;
let vx=0, vy=0, vz=0;
let yaw=0, pitch=0;
let onGround=false;
let canDJ=true;
let mySpeed=0.4;
let gravity=0.018;
let frozen=false;
let godMode=false;
let flyMode=false;
let dashCD=0;

// TASTEN
const keys={};
let chatOpen=false, adminOpen=false;

document.addEventListener('keydown', e=>{
    if(chatOpen && e.key!=='Escape') return;
    keys[e.key.toLowerCase()]=true;
    keys[e.code]=true;
    if(e.key.toLowerCase()==='u') toggleAdmin();
    if(e.key.toLowerCase()==='t'){e.preventDefault(); toggleChat();}
    if(e.key===' ') e.preventDefault();
});
document.addEventListener('keyup', e=>{
    keys[e.key.toLowerCase()]=false;
    keys[e.code]=false;
});

// MAUS
let mouseLocked=false;
document.addEventListener('click', ()=>{
    if(!adminOpen && !chatOpen) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', ()=>{
    mouseLocked=!!document.pointerLockElement;
});
document.addEventListener('mousemove', e=>{
    if(!mouseLocked) return;
    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// CHAT
function toggleChat(){
    chatOpen=!chatOpen;
    const inp=document.getElementById('chatIn');
    inp.style.display=chatOpen?'block':'none';
    if(chatOpen){
        if(document.pointerLockElement) document.exitPointerLock();
        inp.focus();
    }
}
document.getElementById('chatIn').addEventListener('keydown', e=>{
    e.stopPropagation();
    if(e.key==='Enter'){
        const m=e.target.value.trim();
        if(m) socket.emit('chat',{msg:m});
        e.target.value='';
        toggleChat();
    }
    if(e.key==='Escape') toggleChat();
});

// ADMIN
function toggleAdmin(){
    adminOpen=!adminOpen;
    document.getElementById('adminMenu').style.display=adminOpen?'block':'none';
    if(adminOpen && document.pointerLockElement) document.exitPointerLock();
}
function adminCmd(cmd, extra){
    socket.emit('admin_cmd',{cmd:cmd, ...(extra||{})});
}

// MULTIPLAYER
const socket = io();
const others={};

socket.on('init', d=>{
    document.getElementById('players').textContent='Players: '+Object.keys(d.players).length;
});
socket.on('playerMoved', d=>{
    if(!others[d.id]){
        const b=new THREE.Mesh(
            new THREE.CapsuleGeometry(0.35,1,4,8),
            new THREE.MeshStandardMaterial({color:Math.random()*0xffffff, emissive:0x222222, metalness:0.4})
        );
        scene.add(b);
        others[d.id]=b;
    }
    others[d.id].position.set(d.pos.x, d.pos.y, d.pos.z);
    others[d.id].rotation.y=d.pos.ry||0;
});
socket.on('playerLeft', d=>{
    if(others[d.id]){scene.remove(others[d.id]);delete others[d.id];}
    document.getElementById('players').textContent='Players: '+(Object.keys(others).length+1);
});
socket.on('chat', d=>{
    const el=document.getElementById('chatMsgs');
    el.innerHTML+=`<div><b style="color:#0ff">${d.id.slice(0,5)}:</b> ${d.msg}</div>`;
    el.scrollTop=el.scrollHeight;
});
socket.on('admin_action', d=>{
    if(d.action==='kill_all'){px=0;py=3;pz=0;vx=vy=vz=0;showDeath();}
    if(d.action==='tp_all'){px=d.x;py=d.y;pz=d.z;vx=vy=vz=0;}
    if(d.action==='gravity') gravity=0.018*d.value;
    if(d.action==='freeze') frozen=!frozen;
    if(d.action==='speed_boost') mySpeed=1.0;
    if(d.action==='nuke'){vy=2.5;setTimeout(()=>{px=0;py=3;pz=0;vx=vy=vz=0;},2500);}
});

function showDeath(){
    const d=document.getElementById('deathScreen');
    d.style.display='block';
    setTimeout(()=>d.style.display='none',500);
}

// KOLLISION
function checkGround(){
    const pb = new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(px, py, pz),
        new THREE.Vector3(0.7, 1.8, 0.7)
    );
    let grounded=false;
    for(const p of platforms){
        p.box.setFromObject(p.mesh);
        if(pb.intersectsBox(p.box)){
            if(vy<=0 && py > p.box.max.y-0.5){
                py=p.box.max.y+0.9;
                vy=0;
                grounded=true;
            } else if(vy>0 && py < p.box.min.y+1.5){
                vy=0;
            }
        }
    }
    return grounded;
}

// GAME LOOP
let lastSend=0;

function loop(){
    requestAnimationFrame(loop);

    if(!frozen){
        // PFEILTASTEN umschauen
        const lookSpeed=0.03;
        if(keys['arrowleft']) yaw+=lookSpeed;
        if(keys['arrowright']) yaw-=lookSpeed;
        if(keys['arrowup']) pitch=Math.min(1.5, pitch+lookSpeed);
        if(keys['arrowdown']) pitch=Math.max(-1.5, pitch-lookSpeed);

        // Sprint
        const sprint = keys['shift']?2.0:1.0;

        // Richtungen
        const fwdX=-Math.sin(yaw);
        const fwdZ=-Math.cos(yaw);
        const rightX=Math.cos(yaw);
        const rightZ=-Math.sin(yaw);

        const spd=mySpeed*sprint*0.12;

        if(keys['w']){vx+=fwdX*spd; vz+=fwdZ*spd;}
        if(keys['s']){vx-=fwdX*spd; vz-=fwdZ*spd;}
        if(keys['a']){vx-=rightX*spd; vz-=rightZ*spd;}
        if(keys['d']){vx+=rightX*spd; vz+=rightZ*spd;}

        // Dash
        if(dashCD>0) dashCD-=0.016;
        if(keys['e']&&dashCD<=0){
            dashCD=1.5;
            vx+=fwdX*1.2;
            vz+=fwdZ*1.2;
            document.getElementById('dash').style.opacity='1';
            setTimeout(()=>document.getElementById('dash').style.opacity='0',200);
        }

        // Fly
        if(flyMode){
            if(keys[' ']) vy=0.25;
            else if(keys['c']) vy=-0.25;
            else vy*=0.9;
        } else {
            if(!godMode) vy-=gravity;

            // Jump
            if(keys[' ']){
                if(onGround){vy=0.35;canDJ=true;}
                else if(canDJ){vy=0.3;canDJ=false;}
                keys[' ']=false;
            }
        }

        // Reibung
        vx*=0.87;
        vz*=0.87;

        px+=vx;
        py+=vy;
        pz+=vz;

        // Kollision
        onGround=checkGround();

        // Boden
        if(py<1){py=1;vy=0;onGround=true;canDJ=true;}

        // Reset bei Fall
        if(py<-30){px=0;py=3;pz=0;vx=vy=vz=0;showDeath();}
    }

    // Kamera
    camera.position.set(px, py+0.3, pz);
    camera.rotation.order='YXZ';
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    // Head Bob
    const spd2=Math.sqrt(vx*vx+vz*vz);
    if(onGround&&spd2>0.04){
        camera.position.y+=Math.sin(Date.now()*0.012)*0.03;
    }

    // FOV
    camera.fov=85+spd2*50;
    camera.updateProjectionMatrix();

    // HUD
    document.getElementById('pos').textContent=
        `X:${px.toFixed(1)} Y:${py.toFixed(1)} Z:${pz.toFixed(1)}`;
    document.getElementById('speed').textContent=
        (spd2*100).toFixed(0)+' km/h';

    // Senden
    const now=Date.now();
    if(now-lastSend>50){
        socket.emit('move',{x:px,y:py,z:pz,ry:yaw});
        lastSend=now;
    }

    renderer.render(scene, camera);
}

loop();

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
