<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PARKOUR 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none; z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }

        #hud {
            position: fixed; top: 20px; left: 20px;
            color: #0ff; font-size: 14px; z-index: 100;
            text-shadow: 0 0 10px #0ff;
        }
        #speedometer {
            position: fixed; bottom: 30px; right: 30px;
            color: #0f0; font-size: 24px; z-index: 100;
            text-shadow: 0 0 15px #0f0;
        }
        #instructions {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 12px; z-index: 100;
            text-align: center;
        }

        /* ADMIN MENU */
        #adminMenu {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #f00;
            border-radius: 15px;
            padding: 30px;
            z-index: 9999;
            min-width: 400px;
            box-shadow: 0 0 50px rgba(255,0,0,0.5), inset 0 0 30px rgba(255,0,0,0.1);
        }
        #adminMenu h2 {
            color: #f00; text-align: center;
            font-size: 24px; margin-bottom: 20px;
            text-shadow: 0 0 20px #f00;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #f00; }
            to { text-shadow: 0 0 30px #f00, 0 0 60px #f00; }
        }
        .admin-btn {
            display: block; width: 100%; padding: 12px;
            margin: 8px 0; border: 1px solid #f00;
            background: rgba(255,0,0,0.1); color: #f00;
            font-size: 16px; cursor: pointer;
            border-radius: 8px; transition: all 0.3s;
        }
        .admin-btn:hover {
            background: rgba(255,0,0,0.4);
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            transform: scale(1.02);
        }
        .admin-slider {
            width: 100%; margin: 5px 0;
            accent-color: #f00;
        }
        .admin-label { color: #f88; font-size: 13px; }
        #adminClose {
            position: absolute; top: 10px; right: 15px;
            color: #f00; font-size: 20px; cursor: pointer;
            background: none; border: none;
        }

        /* Chat */
        #chatBox {
            position: fixed; bottom: 60px; left: 20px;
            width: 300px; z-index: 200;
        }
        #chatMessages {
            height: 150px; overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border-radius: 8px; padding: 10px;
            margin-bottom: 5px; color: #fff; font-size: 13px;
        }
        #chatInput {
            width: 100%; padding: 8px;
            background: rgba(0,0,0,0.7); border: 1px solid #555;
            color: #fff; border-radius: 5px;
            display: none;
        }

        /* Dash Effekt */
        #dashOverlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            background: radial-gradient(circle, transparent 60%, rgba(0,200,255,0.3));
            opacity: 0; transition: opacity 0.2s;
        }

        #playerCount {
            position: fixed; top: 20px; right: 20px;
            color: #ff0; font-size: 16px; z-index: 100;
            text-shadow: 0 0 10px #ff0;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud">
        <div id="posInfo">X: 0 Y: 0 Z: 0</div>
        <div id="velInfo">Speed: 0</div>
    </div>
    <div id="speedometer">0 km/h</div>
    <div id="playerCount">Players: 1</div>
    <div id="instructions">
        WASD = Move | SPACE = Jump | SHIFT = Sprint | E = Dash | Q = Slide | CLICK = Lock Mouse<br>
        T = Chat | Double Jump möglich! | Wallrun an Wänden!
    </div>
    <div id="dashOverlay"></div>

    <!-- Chat -->
    <div id="chatBox">
        <div id="chatMessages"></div>
        <input id="chatInput" placeholder="Nachricht eingeben..." />
    </div>

    <!-- ADMIN MENU (Geheim!) -->
    <div id="adminMenu">
        <button id="adminClose" onclick="toggleAdmin()">✕</button>
        <h2>☠ ADMIN PANEL ☠</h2>
        <button class="admin-btn" onclick="adminCmd('kill_all')">💀 Kill All Players</button>
        <button class="admin-btn" onclick="adminCmd('speed_boost')">⚡ Speed Boost Alle</button>
        <button class="admin-btn" onclick="adminCmd('tp_all')">🌀 Teleport All nach oben</button>
        <button class="admin-btn" onclick="adminCmd('freeze')">🧊 Freeze All</button>
        <button class="admin-btn" onclick="adminCmd('nuke')">💣 NUKE</button>
        <label class="admin-label">Gravitation:</label>
        <input type="range" class="admin-slider" min="0" max="200" value="100"
               oninput="adminCmd('gravity', {value: this.value / 100})">
        <label class="admin-label">Eigene Geschwindigkeit:</label>
        <input type="range" class="admin-slider" min="1" max="50" value="10"
               oninput="adminSpeed(this.value)">
        <button class="admin-btn" onclick="adminCmd('speed_boost')">🚀 Fly Mode Toggle</button>
        <button class="admin-btn" onclick="toggleGodMode()">🛡 God Mode</button>
        <button class="admin-btn" onclick="toggleInvisible()">👻 Invisible</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>

    <script>
    // ============ SETUP ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x110022);
    scene.fog = new THREE.FogExp2(0x110022, 0.008);

    const camera = new THREE.PerspectiveCamera(90, innerWidth/innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ============ LICHT ============
    const ambientLight = new THREE.AmbientLight(0x334455, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // Neon Lichter
    const colors = [0xff0044, 0x00ffcc, 0x4400ff, 0xff8800, 0x00ff44];
    for(let i = 0; i < 20; i++) {
        const pl = new THREE.PointLight(colors[i%colors.length], 2, 30);
        pl.position.set(Math.random()*200-100, Math.random()*30+5, Math.random()*200-100);
        scene.add(pl);
    }

    // ============ MATERIALIEN ============
    function neonMat(color) {
        return new THREE.MeshStandardMaterial({
            color: color, emissive: color,
            emissiveIntensity: 0.3, metalness: 0.8, roughness: 0.2
        });
    }

    // ============ BODEN ============
    const groundGeo = new THREE.PlaneGeometry(400, 400, 40, 40);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x111133, metalness: 0.9, roughness: 0.1
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid auf Boden
    const gridHelper = new THREE.GridHelper(400, 80, 0x0033ff, 0x001166);
    scene.add(gridHelper);

    // ============ PARKOUR LEVEL ============
    const platforms = [];

    function addPlatform(x, y, z, w, h, d, color) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = neonMat(color || 0x00ffcc);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        platforms.push(mesh);
        return mesh;
    }

    // Anfangs-Plattformen (einfacher Parkour)
    addPlatform(0, 1, 0, 10, 2, 10, 0x00ffcc);     // Start
    addPlatform(12, 3, 0, 6, 1, 6, 0xff0044);
    addPlatform(22, 5, 5, 5, 1, 5, 0x4400ff);
    addPlatform(30, 8, 0, 4, 1, 4, 0xff8800);
    addPlatform(38, 11, -5, 5, 1, 5, 0x00ff44);
    addPlatform(46, 14, 0, 6, 1, 3, 0xff0044);

    // Treppenstufen
    for(let i = 0; i < 10; i++) {
        addPlatform(55 + i*4, 16 + i*2, 0, 3, 1, 4, colors[i%5]);
    }

    // Lange schmale Brücke
    addPlatform(100, 36, 0, 40, 1, 2, 0x00ffcc);

    // Wallrun Wände
    const wallGeo = new THREE.BoxGeometry(1, 20, 30);
    const wallMat = neonMat(0xff0066);
    const wallLeft = new THREE.Mesh(wallGeo, wallMat);
    wallLeft.position.set(128, 40, 0);
    scene.add(wallLeft); platforms.push(wallLeft);

    const wallRight = new THREE.Mesh(wallGeo, neonMat(0x0066ff));
    wallRight.position.set(148, 40, 0);
    scene.add(wallRight); platforms.push(wallRight);

    // Schwebende Plattformen in der Luft
    for(let i = 0; i < 15; i++) {
        addPlatform(
            155 + Math.sin(i*0.8)*15,
            38 + Math.sin(i*0.5)*8,
            Math.cos(i*0.8)*15,
            3 + Math.random()*3, 0.5, 3 + Math.random()*3,
            colors[i%5]
        );
    }

    // Riesige End-Plattform
    addPlatform(200, 35, 0, 20, 2, 20, 0xffff00);

    // Dekorative Säulen
    for(let i = 0; i < 30; i++) {
        const h = 10 + Math.random() * 40;
        const geo = new THREE.CylinderGeometry(0.5, 0.5, h, 8);
        const mat = neonMat(colors[i%5]);
        const cyl = new THREE.Mesh(geo, mat);
        cyl.position.set(
            Math.random()*300-100, h/2,
            Math.random()*300-100
        );
        scene.add(cyl);
        platforms.push(cyl);
    }

    // Schwebende Ringe
    for(let i = 0; i < 10; i++) {
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(3, 0.3, 8, 20),
            neonMat(colors[i%5])
        );
        ring.position.set(
            Math.random()*100, 20+Math.random()*30,
            Math.random()*100-50
        );
        ring.rotation.x = Math.random() * Math.PI;
        scene.add(ring);
    }

    // Skybox Sterne
    const starGeo = new THREE.BufferGeometry();
    const starVerts = [];
    for(let i = 0; i < 5000; i++) {
        starVerts.push(
            (Math.random()-0.5)*1000,
            Math.random()*500+50,
            (Math.random()-0.5)*1000
        );
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
    scene.add(new THREE.Points(starGeo, starMat));

    // ============ SPIELER ============
    let playerVel = new THREE.Vector3();
    let playerPos = new THREE.Vector3(0, 5, 0);
    let onGround = false;
    let canDoubleJump = true;
    let moveSpeed = 0.3;
    let sprintMultiplier = 1;
    let gravity = 0.015;
    let jumpForce = 0.35;
    let isSliding = false;
    let isDashing = false;
    let dashCooldown = 0;
    let godMode = false;
    let invisible = false;
    let flyMode = false;
    let frozen = false;
    let wallRunning = false;

    // Maus
    let yaw = 0, pitch = 0;
    let mouseLocked = false;
    const sensitivity = 0.002;

    document.addEventListener('click', () => {
        if (!document.pointerLockElement) {
            renderer.domElement.requestPointerLock();
        }
    });
    document.addEventListener('pointerlockchange', () => {
        mouseLocked = !!document.pointerLockElement;
    });
    document.addEventListener('mousemove', (e) => {
        if (!mouseLocked) return;
        yaw -= e.movementX * sensitivity;
        pitch -= e.movementY * sensitivity;
        pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
    });

    // Tasten
    const keys = {};
    let chatOpen = false;
    let adminOpen = false;

    document.addEventListener('keydown', (e) => {
        if (chatOpen && e.key !== 'Escape') return;
        keys[e.key.toLowerCase()] = true;

        if (e.key.toLowerCase() === 'u') toggleAdmin();
        if (e.key.toLowerCase() === 't') toggleChat();
    });
    document.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
    });

    // ============ MULTIPLAYER ============
    const socket = io();
    const otherPlayers = {};

    socket.on('init', (data) => {
        document.getElementById('playerCount').textContent =
            'Players: ' + Object.keys(data.players).length;
    });

    socket.on('playerMoved', (data) => {
        if (!otherPlayers[data.id]) {
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 1.2, 4, 8),
                new THREE.MeshStandardMaterial({
                    color: Math.random() * 0xffffff,
                    emissive: Math.random() * 0x444444,
                    metalness: 0.5
                })
            );
            scene.add(body);
            otherPlayers[data.id] = body;
        }
        const p = otherPlayers[data.id];
        p.position.set(data.pos.x, data.pos.y, data.pos.z);
        p.rotation.y = data.pos.ry || 0;
    });

    socket.on('playerLeft', (data) => {
        if (otherPlayers[data.id]) {
            scene.remove(otherPlayers[data.id]);
            delete otherPlayers[data.id];
        }
        document.getElementById('playerCount').textContent =
            'Players: ' + (Object.keys(otherPlayers).length + 1);
    });

    socket.on('chat', (data) => {
        const el = document.getElementById('chatMessages');
        el.innerHTML += `<div><b style="color:#0ff">${data.id.slice(0,6)}:</b> ${data.msg}</div>`;
        el.scrollTop = el.scrollHeight;
    });

    socket.on('admin_action', (data) => {
        if(data.action === 'kill_all') {
            playerPos.set(0, 5, 0);
            playerVel.set(0, 0, 0);
        }
        if(data.action === 'tp_all') {
            playerPos.set(data.x, data.y, data.z);
            playerVel.set(0, 0, 0);
        }
        if(data.action === 'gravity') gravity = 0.015 * data.value;
        if(data.action === 'freeze') frozen = !frozen;
        if(data.action === 'speed_boost') moveSpeed = 0.8;
        if(data.action === 'nuke') {
            playerVel.y = 2;
            setTimeout(() => { playerPos.set(0, 5, 0); playerVel.set(0,0,0); }, 3000);
        }
    });

    // ============ ADMIN FUNKTIONEN ============
    function toggleAdmin() {
        adminOpen = !adminOpen;
        document.getElementById('adminMenu').style.display = adminOpen ? 'block' : 'none';
        if(adminOpen && document.pointerLockElement)
            document.exitPointerLock();
    }

    function adminCmd(cmd, extra) {
        socket.emit('admin_cmd', { cmd: cmd, ...extra });
    }

    function adminSpeed(val) {
        moveSpeed = parseFloat(val) * 0.05;
    }

    function toggleGodMode() {
        godMode = !godMode;
        alert(godMode ? 'God Mode ON' : 'God Mode OFF');
    }

    function toggleInvisible() {
        invisible = !invisible;
        alert(invisible ? 'Invisible ON' : 'Invisible OFF');
    }

    // ============ CHAT ============
    function toggleChat() {
        chatOpen = !chatOpen;
        const input = document.getElementById('chatInput');
        input.style.display = chatOpen ? 'block' : 'none';
        if (chatOpen) {
            if(document.pointerLockElement) document.exitPointerLock();
            input.focus();
        }
    }
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
        e.stopPropagation();
        if(e.key === 'Enter') {
            const msg = e.target.value.trim();
            if(msg) socket.emit('chat', { msg: msg });
            e.target.value = '';
            toggleChat();
        }
        if(e.key === 'Escape') toggleChat();
    });

    // ============ KOLLISION ============
    function checkCollision(pos) {
        const playerBox = new THREE.Box3().setFromCenterAndSize(
            pos, new THREE.Vector3(0.8, 1.8, 0.8)
        );
        let grounded = false;
        let wallHit = false;

        for (const plat of platforms) {
            const platBox = new THREE.Box3().setFromObject(plat);
            if (playerBox.intersectsBox(platBox)) {
                // Oben drauf
                if(playerVel.y <= 0 && pos.y > platBox.max.y - 0.5) {
                    pos.y = platBox.max.y + 0.9;
                    playerVel.y = 0;
                    grounded = true;
                }
                // Unten dagegen
                else if(playerVel.y > 0 && pos.y < platBox.min.y + 1) {
                    playerVel.y = 0;
                }
                // Seite (Wallrun)
                else {
                    wallHit = true;
                }
            }
        }
        return { grounded, wallHit };
    }

    // ============ GAME LOOP ============
    let lastSend = 0;
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);

        if (!frozen) {
            // Sprint
            sprintMultiplier = keys['shift'] ? 2.2 : 1;

            // Slide
            if (keys['q'] && onGround && sprintMultiplier > 1) {
                isSliding = true;
                camera.position.y -= 0.5;
            } else {
                isSliding = false;
            }

            // Dash
            if(dashCooldown > 0) dashCooldown -= dt;
            if(keys['e'] && dashCooldown <= 0) {
                isDashing = true;
                dashCooldown = 1.5;
                const dashDir = new THREE.Vector3(0, 0, -1);
                dashDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                playerVel.x += dashDir.x * 1.5;
                playerVel.z += dashDir.z * 1.5;
                document.getElementById('dashOverlay').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('dashOverlay').style.opacity = '0';
                    isDashing = false;
                }, 200);
            }

            // Bewegung
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            const right = new THREE.Vector3(1, 0, 0);
            right.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

            const speed = moveSpeed * sprintMultiplier * (isSliding ? 1.5 : 1);

            if(keys['w']) { playerVel.x += forward.x * speed * 0.1; playerVel.z += forward.z * speed * 0.1; }
            if(keys['s']) { playerVel.x -= forward.x * speed * 0.1; playerVel.z -= forward.z * speed * 0.1; }
            if(keys['a']) { playerVel.x -= right.x * speed * 0.1; playerVel.z -= right.z * speed * 0.1; }
            if(keys['d']) { playerVel.x += right.x * speed * 0.1; playerVel.z += right.z * speed * 0.1; }

            // Fly Mode
            if(flyMode) {
                if(keys[' ']) playerVel.y = 0.3;
                else if(keys['c']) playerVel.y = -0.3;
                else playerVel.y *= 0.9;
            } else {
                // Gravity
                if(!godMode) playerVel.y -= gravity;

                // Jump
                if(keys[' ']) {
                    if(onGround) {
                        playerVel.y = jumpForce;
                        canDoubleJump = true;
                    } else if(canDoubleJump) {
                        playerVel.y = jumpForce * 0.85;
                        canDoubleJump = false;
                    }
                    // Wallrun Jump
                    if(wallRunning) {
                        playerVel.y = jumpForce * 1.2;
                        wallRunning = false;
                    }
                    keys[' '] = false;
                }
            }

            // Reibung
            playerVel.x *= 0.88;
            playerVel.z *= 0.88;

            // Position
            playerPos.add(playerVel);

            // Kollision
            const collision = checkCollision(playerPos);
            onGround = collision.grounded;

            // Wallrun
            if(collision.wallHit && !onGround && (keys['w'])) {
                wallRunning = true;
                playerVel.y = Math.max(playerVel.y, 0.05);
            } else {
                wallRunning = false;
            }

            // Boden
            if(playerPos.y < 1) {
                playerPos.y = 1;
                playerVel.y = 0;
                onGround = true;
                canDoubleJump = true;
            }

            // Fallen = Reset
            if(playerPos.y < -50) {
                playerPos.set(0, 5, 0);
                playerVel.set(0, 0, 0);
            }
        }

        // Kamera
        camera.position.copy(playerPos);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        // Head bob
        if(onGround && playerVel.length() > 0.05) {
            camera.position.y += Math.sin(Date.now() * 0.01) * 0.04;
        }

        // FOV bei Speed
        const speed = Math.sqrt(playerVel.x**2 + playerVel.z**2);
        camera.fov = THREE.MathUtils.lerp(camera.fov, 80 + speed * 40, 0.1);
        camera.updateProjectionMatrix();

        // HUD
        document.getElementById('posInfo').textContent =
            `X: ${playerPos.x.toFixed(1)} Y: ${playerPos.y.toFixed(1)} Z: ${playerPos.z.toFixed(1)}`;
        document.getElementById('speedometer').textContent =
            (speed * 100).toFixed(0) + ' km/h';

        // Multiplayer senden
        const now = Date.now();
        if(now - lastSend > 50) {
            socket.emit('move', {
                x: playerPos.x, y: playerPos.y, z: playerPos.z,
                ry: yaw
            });
            lastSend = now;
        }

        // Plattformen animieren
        platforms.forEach((p, i) => {
            if(i > 20) {
                p.position.y += Math.sin(Date.now() * 0.001 + i) * 0.005;
            }
        });

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
